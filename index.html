<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zahra ❤️</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='.9em' font-size='90'>💖</text>
</svg>">

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:'Segoe UI';
overflow:hidden;
padding:20px;
}

/* floating hearts */

.bg-heart{
position:fixed;
font-size:18px;
opacity:0.5;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* card */

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:90%;
max-width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
}

p{
font-size:18px;
color:#555;
line-height:1.6;
margin-bottom:30px;
}

.buttons{
display:flex;
flex-direction:column;
gap:15px;
}

/* buttons */

button{
padding:14px 20px;
font-size:17px;
border:none;
border-radius:30px;
cursor:pointer;
}

#satBtn{
background:#ff4d6d;
color:white;
}

#sunBtn{
background:#ff758c;
color:white;
}

#noBtn{
background:#eee;
border:2px solid #ff4d6d;
}

/* final */

#final{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
text-align:center;
opacity:0;
pointer-events:none;
padding:30px;
transition:0.6s;
}

#typing{
font-size:22px;
max-width:500px;
}

/* confetti */

.confetti{
position:fixed;
font-size:22px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(100vh)}
}

/* mobile */

@media(max-width:480px){

.card{padding:25px}
p{font-size:16px}
button{font-size:15px}

}

</style>

</head>

<body>

<div class="card">

<h1>Zahra ❤️</h1>

<p>
Today didn’t work out…  
But I would really love to see you next weekend.

Pick the day that works for you 🥺

</p>

<div class="buttons">

<button id="satBtn">Saturday • 14 March</button> <button id="sunBtn">Sunday • 15 March</button> <button id="noBtn">Maybe later 🙈</button>

</div>

</div>

<div id="final">

<h1>Yay Zahra ❤️</h1>

<div id="typing"></div>

</div>

<script>

/* floating hearts */

setInterval(()=>{

let h=document.createElement("div")

h.innerHTML="💖"
h.className="bg-heart"

h.style.left=Math.random()*100+"vw"

document.body.appendChild(h)

setTimeout(()=>h.remove(),8000)

},700)


const satBtn=document.getElementById("satBtn")
const sunBtn=document.getElementById("sunBtn")
const noBtn=document.getElementById("noBtn")

const final=document.getElementById("final")
const typing=document.getElementById("typing")

const isMobile=/Mobi|Android/i.test(navigator.userAgent)

/* telegram */

function sendTelegram(message){

fetch("https://api.telegram.org/bot8702884424:AAEqRe5wr6zHrAgzOphFhvydtDyLJsfWpM8/sendMessage",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

chat_id:"1681052146",

text:message

})

}).catch(()=>{})

}

/* Saturday click */

satBtn.onclick=function(){

sendTelegram("❤️ Zahra chose SATURDAY (14 March) to meet")

showFinal()

}

/* Sunday click */

sunBtn.onclick=function(){

sendTelegram("❤️ Zahra chose SUNDAY (15 March) to meet")

showFinal()

}

/* final screen */

function showFinal(){

document.querySelector(".card").style.opacity=0

final.style.opacity=1
final.style.pointerEvents="auto"

/* confetti */

for(let i=0;i<40;i++){

let c=document.createElement("div")

c.className="confetti"
c.innerHTML="💖"

c.style.left=Math.random()*100+"vw"

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

/* typing */

let message="I’m really looking forward to seeing you Zahra. This just made my day ❤️"

let i=0

function type(){

if(i<message.length){
typing.innerHTML+=message.charAt(i)
i++
setTimeout(type,40)
}

}

type()

}

/* desktop escape */

if(!isMobile){

document.addEventListener("mousemove",e=>{

let rect=noBtn.getBoundingClientRect()

let dx=rect.left+rect.width/2-e.clientX
let dy=rect.top+rect.height/2-e.clientY

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

let angle=Math.atan2(dy,dx)

let x=rect.left+Math.cos(angle)*60
let y=rect.top+Math.sin(angle)*60

x=Math.max(10,Math.min(window.innerWidth-rect.width-10,x))
y=Math.max(10,Math.min(window.innerHeight-rect.height-10,y))

noBtn.style.position="fixed"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

})

}

/* mobile jump */

noBtn.onclick=function(){

if(isMobile){

let rect=noBtn.getBoundingClientRect()

let x=Math.random()*(window.innerWidth-rect.width)
let y=Math.random()*(window.innerHeight-rect.height)

noBtn.style.position="fixed"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

}

</script>

</body>
</html>
