<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zahra ❤️</title>

<!-- Cute favicon -->

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥺</text></svg>">

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Segoe UI;
overflow:hidden;
padding:20px;
}

.card{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
width:90%;
max-width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
font-size:28px;
}

p{
font-size:18px;
color:#555;
margin-bottom:30px;
line-height:1.5;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
}

button{
padding:14px 28px;
font-size:18px;
border-radius:30px;
border:none;
cursor:pointer;
}

#yesBtn{
background:#ff4d6d;
color:white;
}

#noBtn{
background:#eee;
border:2px solid #ff4d6d;
}

/* final screen */

#final{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
opacity:0;
pointer-events:none;
transition:0.8s;
padding:20px;
}

#final h1{
font-size:36px;
}

/* hearts */

.heart{
position:fixed;
font-size:24px;
animation:fly 1s linear forwards;
pointer-events:none;
}

@keyframes fly{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-120px)}
}

/* mobile */

@media(max-width:480px){

h1{font-size:24px}
p{font-size:16px}
button{font-size:16px;padding:12px 22px}

}

</style>

</head>

<body>

<div class="card">

<h1>Zahra ❤️</h1>

<p>
I know this is random...  
But I would really love to see you today.  
Would you like to meet me? 🥺
</p>

<div class="buttons">

<button id="yesBtn">Okay let's meet ❤️</button> <button id="noBtn">Not today 🙈</button>

</div>

</div>

<div id="final">

<h1>Yay Zahra ❤️</h1>

<p>
You just made my day.  
I can't wait to see you.
</p>

</div>

<script>

const yesBtn=document.getElementById("yesBtn")
const noBtn=document.getElementById("noBtn")
const final=document.getElementById("final")

const isMobile=/Mobi|Android/i.test(navigator.userAgent)

/* TELEGRAM ALERT */

function notifyTelegram(){

fetch("https://api.telegram.org/bot8702884424:AAEqRe5wr6zHrAgzOphFhvydtDyLJsfWpM8/sendMessage",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

chat_id:"1681052146",

text:"🔥 Zahra clicked OK to meet ❤️"

})

}).catch(()=>{});

}


/* YES BUTTON */

yesBtn.onclick=function(){

notifyTelegram()

final.style.opacity=1
final.style.pointerEvents="auto"

/* hearts */

for(let i=0;i<12;i++){

let heart=document.createElement("div")

heart.innerHTML="💖"
heart.className="heart"

heart.style.left=Math.random()*window.innerWidth+"px"
heart.style.top=window.innerHeight+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

}


/* DESKTOP ESCAPE */

if(!isMobile){

document.addEventListener("mousemove",e=>{

let rect=noBtn.getBoundingClientRect()

let dx=rect.left+rect.width/2-e.clientX
let dy=rect.top+rect.height/2-e.clientY

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

let angle=Math.atan2(dy,dx)

let moveX=Math.cos(angle)*60
let moveY=Math.sin(angle)*60

let newX=rect.left+moveX
let newY=rect.top+moveY

/* keep inside screen */

newX=Math.max(10,Math.min(window.innerWidth-rect.width-10,newX))
newY=Math.max(10,Math.min(window.innerHeight-rect.height-10,newY))

noBtn.style.position="fixed"
noBtn.style.left=newX+"px"
noBtn.style.top=newY+"px"

}

})

}


/* MOBILE TAP */

noBtn.onclick=function(){

if(isMobile){

let rect=noBtn.getBoundingClientRect()

let newX=Math.random()*(window.innerWidth-rect.width)
let newY=Math.random()*(window.innerHeight-rect.height)

noBtn.style.position="fixed"
noBtn.style.left=newX+"px"
noBtn.style.top=newY+"px"

}

}

</script>

</body>
</html>
